name: Create Prayer Video

on:
  workflow_dispatch:
    inputs:
      mp3Url:
        description: 'Public R2 URL of the prayer MP3'
        required: true
      prayerId:
        description: 'Prayer ID'
        required: true
      title:
        description: 'Prayer title'
        required: true
      verse:
        description: 'Bible verse'
        required: false
        default: ''
      date:
        description: 'Date (YYYY-MM-DD)'
        required: true

jobs:
  create-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Download prayer MP3
        run: |
          curl -L "${{ github.event.inputs.mp3Url }}" -o prayer.mp3
          echo "MP3 downloaded: $(du -sh prayer.mp3)"

      - name: Get MP3 duration
        id: duration
        run: |
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 prayer.mp3 | cut -d. -f1)
          TOTAL=$((DURATION + 3))
          echo "duration=$TOTAL" >> $GITHUB_OUTPUT
          echo "Prayer duration: ${DURATION}s, video will be ${TOTAL}s"

      - name: Pick and download random background video
        run: |
          BACKGROUNDS=(
            "${{ secrets.BACKGROUND_VIDEO_URL_1 }}"
            "${{ secrets.BACKGROUND_VIDEO_URL_2 }}"
            "${{ secrets.BACKGROUND_VIDEO_URL_3 }}"
          )
          PICKED=${BACKGROUNDS[$RANDOM % ${#BACKGROUNDS[@]}]}
          echo "Selected: $PICKED"
          curl -L "$PICKED" -o background_src.mp4
          echo "Downloaded: $(du -sh background_src.mp4)"
          DURATION=${{ steps.duration.outputs.duration }}
          # Scale to 1080x1920 (vertical 9:16) and loop to match duration
          ffmpeg -stream_loop -1 -i background_src.mp4 -t $DURATION \
            -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920" \
            -c:v libx264 -preset fast -an background.mp4 -y
          echo "Background ready: $(du -sh background.mp4)"

      - name: Download background music
        run: |
          curl -L "${{ secrets.BACKGROUND_MUSIC_URL }}" -o music_src.mp3
          DURATION=${{ steps.duration.outputs.duration }}
          ffmpeg -stream_loop -1 -i music_src.mp3 -t $DURATION \
            -af "afade=t=out:st=$((DURATION - 2)):d=2,volume=0.12" \
            music.mp3 -y

      - name: Install fonts
        run: |
          sudo apt-get install -y fonts-liberation fonts-dejavu
          fc-cache -f -v

      - name: Create prayer video with FFmpeg
        run: |
          TITLE="${{ github.event.inputs.title }}"
          DURATION=${{ steps.duration.outputs.duration }}
          RAW_VERSE="${{ github.event.inputs.verse }}"
          # Split verse into two lines at the dash (before reference)
          VERSE_TEXT=$(echo "$RAW_VERSE" | sed 's/ — .*//')
          VERSE_REF=$(echo "$RAW_VERSE" | grep -o '— .*' || echo '')
          # Truncate if still too long
          VERSE_TEXT="${VERSE_TEXT:0:70}"
          VERSE_REF="${VERSE_REF:0:40}"

          ffmpeg \
            -i background.mp4 \
            -i prayer.mp3 \
            -i music.mp3 \
            -filter_complex \
            "[1:a]volume=2.5,afade=t=in:st=0:d=1,afade=t=out:st=$((DURATION - 2)):d=2[voice];[2:a]volume=0.12[music];[music][voice]amix=inputs=2:duration=first[audio];[0:v]\
drawtext=text='✝':fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSerif.ttf:fontsize=120:fontcolor=0xFFDC64@0.95:x=(w-text_w)/2:y=h*0.07:shadowcolor=black:shadowx=3:shadowy=3,\
drawtext=text='Daily Prayer':fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Regular.ttf:fontsize=44:fontcolor=0xFFDC64@0.75:x=(w-text_w)/2:y=h*0.20:shadowcolor=black:shadowx=2:shadowy=2:text_shaping=1,\
drawtext=text='${TITLE}':fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSerif-Bold.ttf:fontsize=72:fontcolor=white@1.0:x=(w-text_w)/2:y=h*0.44:shadowcolor=black:shadowx=3:shadowy=3,\
drawtext=text='${VERSE_TEXT}':fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSerif-Italic.ttf:fontsize=38:fontcolor=0xFFDC64@0.90:x=(w-text_w)/2:y=h*0.74:shadowcolor=black:shadowx=2:shadowy=2,\
drawtext=text='${VERSE_REF}':fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Regular.ttf:fontsize=34:fontcolor=0xFFDC64@0.65:x=(w-text_w)/2:y=h*0.81:shadowcolor=black:shadowx=1:shadowy=1\
[v]" \
            -map "[v]" -map "[audio]" \
            -t $DURATION \
            -c:v libx264 -preset fast -crf 20 \
            -c:a aac -b:a 192k \
            -movflags +faststart \
            output.mp4 -y

          echo "Video created: $(du -sh output.mp4)"

      - name: Upload to YouTube
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: node scripts/upload-youtube.js "${{ github.event.inputs.title }}" "${{ github.event.inputs.verse }}" "${{ github.event.inputs.date }}"

      - name: Save video as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: prayer-video-${{ github.event.inputs.date }}-${{ github.event.inputs.prayerId }}
          path: output.mp4
          retention-days: 7
