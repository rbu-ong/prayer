name: Create Prayer Video

on:
  workflow_dispatch:
    inputs:
      mp3Url:
        description: 'Public R2 URL of the prayer MP3'
        required: true
      prayerId:
        description: 'Prayer ID'
        required: true
      title:
        description: 'Prayer title'
        required: true
      verse:
        description: 'Bible verse'
        required: false
        default: ''
      text:
        description: 'Full prayer text'
        required: false
        default: ''
      date:
        description: 'Date (YYYY-MM-DD)'
        required: true

jobs:
  create-video:
    runs-on: ubuntu-latest
    if: github.event.inputs.mp3Url != ''

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install FFmpeg and tools
        run: sudo apt-get install -y ffmpeg bc fonts-liberation fonts-dejavu

      - name: Download prayer MP3
        run: |
          curl -L "${{ github.event.inputs.mp3Url }}" -o prayer.mp3
          echo "MP3 downloaded: $(du -sh prayer.mp3)"

      - name: Get MP3 duration
        id: duration
        run: |
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 prayer.mp3 | cut -d. -f1)
          TOTAL=$((DURATION + 3))
          echo "duration=$TOTAL" >> $GITHUB_OUTPUT
          echo "Prayer duration: ${DURATION}s, video will be ${TOTAL}s"

      - name: Pick and download random background video
        run: |
          BACKGROUNDS=("${{ secrets.BACKGROUND_VIDEO_URL_1 }}" "${{ secrets.BACKGROUND_VIDEO_URL_2 }}" "${{ secrets.BACKGROUND_VIDEO_URL_3 }}")
          PICKED=${BACKGROUNDS[$RANDOM % ${#BACKGROUNDS[@]}]}
          echo "Selected: $PICKED"
          curl -L "$PICKED" -o background_src.mp4
          DURATION=${{ steps.duration.outputs.duration }}
          ffmpeg -stream_loop -1 -i background_src.mp4 -t $DURATION -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920" -c:v libx264 -preset fast -an background.mp4 -y
          echo "Background ready: $(du -sh background.mp4)"

      - name: Download background music
        run: |
          curl -L "${{ secrets.BACKGROUND_MUSIC_URL }}" -o music_src.mp3
          DURATION=${{ steps.duration.outputs.duration }}
          ffmpeg -stream_loop -1 -i music_src.mp3 -t $DURATION -af "afade=t=out:st=$((DURATION - 2)):d=2,volume=0.12" music.mp3 -y

      - name: Create prayer video
        env:
          PRAYER_TITLE: ${{ github.event.inputs.title }}
          PRAYER_VERSE: ${{ github.event.inputs.verse }}
          PRAYER_TEXT: ${{ github.event.inputs.text }}
          PRAYER_DURATION: ${{ steps.duration.outputs.duration }}
        run: |
          chmod +x scripts/create-video.sh
          bash scripts/create-video.sh "$PRAYER_TITLE" "$PRAYER_VERSE" "$PRAYER_TEXT" "$PRAYER_DURATION"

      - name: Upload to YouTube
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PRAYER_TITLE: ${{ github.event.inputs.title }}
          PRAYER_VERSE: ${{ github.event.inputs.verse }}
          PRAYER_DATE:  ${{ github.event.inputs.date }}
        run: node scripts/upload-youtube.js "$PRAYER_TITLE" "$PRAYER_VERSE" "$PRAYER_DATE"

      - name: Save video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: prayer-video-${{ github.event.inputs.date }}-${{ github.event.inputs.prayerId }}
          path: output.mp4
          retention-days: 7
